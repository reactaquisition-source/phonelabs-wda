name: PhoneLabs WDA Build (iOS real device)

# Build WebDriverAgent (vanilla in Phase 1, +H.264 server in Phase 2) UNSIGNED
# for real iOS devices on a free macOS runner. Output = a .ipa artifact we then
# sign on Windows with our own Apple cert (zsign) and install via go-ios.

on:
  workflow_dispatch:

env:
  XCODE_VERSION: "16.4"

jobs:
  build-ios:
    name: Build unsigned WDA .ipa for iOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "${{ env.XCODE_VERSION }}"

      - name: Build WDA (unsigned, real device)
        run: |
          set -e
          xcodebuild clean build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -derivedDataPath appium_wda_ios \
            -scheme WebDriverAgentRunner \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO ARCHS=arm64 \
            RUN_CLANG_STATIC_ANALYZER=NO

      - name: Package the full .app into a signable .ipa
        run: |
          set -e
          APP_DIR="appium_wda_ios/Build/Products/Debug-iphoneos"
          echo "=== build products ==="
          ls -la "$APP_DIR"
          echo "=== .app tree (depth 3) ==="
          find "$APP_DIR/WebDriverAgentRunner-Runner.app" -maxdepth 3 | sort
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_DIR/WebDriverAgentRunner-Runner.app" Payload/
          # XCTest frameworks are provided by the device DeveloperDiskImage on
          # real devices -> drop them to keep the package lean (mirrors Appium).
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/XC*.framework
          rm -rf Payload/WebDriverAgentRunner-Runner.app/Frameworks/Testing.framework
          rm -f  Payload/WebDriverAgentRunner-Runner.app/Frameworks/libXCTestSwiftSupport.dylib
          zip -qry WebDriverAgentRunner-Runner.ipa Payload
          echo "=== .ipa contents ==="
          unzip -l WebDriverAgentRunner-Runner.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: WDA-PhoneLabs-ipa
          path: WebDriverAgentRunner-Runner.ipa
          if-no-files-found: error
